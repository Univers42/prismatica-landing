services:
  build:
    build:
      context: .
      target: build
    user: "${UID}:${GID}"
    volumes:
      - ./dist:/libcss/dist
    profiles: ["build"]

  dev:
    build:
      context: .
      target: dev
    user: "${UID}:${GID}"
    volumes:
      - ./src:/libcss/src:ro
      - ./dist:/libcss/dist
    profiles: ["dev"]

  lint:
    build:
      context: .
      target: lint
    volumes:
      - ./src:/libcss/src:ro
      - ./.stylelintrc.json:/libcss/.stylelintrc.json:ro
    profiles: ["lint"]

  lint-scss:
    build:
      context: .
      target: lint-scss
    volumes:
      - ./src:/libcss/src:ro
      - ./.stylelintrc.json:/libcss/.stylelintrc.json:ro
    profiles: ["lint-scss"]

  lint-ts:
    build:
      context: .
      target: lint-ts
    volumes:
      - ./src:/libcss/src:ro
    profiles: ["lint-ts"]

  typecheck:
    build:
      context: .
      target: typecheck
    volumes:
      - ./src:/libcss/src:ro
    profiles: ["typecheck"]

  docs:
    build:
      context: .
      target: docs
    volumes:
      - ./src:/libcss/src:ro
      - ./docs:/libcss/docs
    profiles: ["docs"]
